name: Migrate component dirs B2 to R2

# One-off: copy the per-project component feed dirs (clashoo/, daed/) from the
# old B2 bucket to R2. The unified sdk dirs (24.10/25.12) were already mirrored;
# only these component dirs (used by the one-click install.sh) were missed.
# Direct B2->R2 in the cloud — secrets never leave GitHub Actions.

on:
  workflow_dispatch:
    inputs:
      dirs:
        description: "Space-separated component dirs to copy"
        default: "clashoo daed"

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone (B2 + R2)
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [b2]
          type = b2
          account = ${B2_KEY_ID}
          key = ${B2_APPLICATION_KEY}
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = ${R2_ENDPOINT}
          acl = private
          no_check_bucket = true
          EOF

      - name: Copy component dirs B2 -> R2
        env:
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          for d in ${{ github.event.inputs.dirs }}; do
            echo "=== $d : B2 -> R2 ==="
            rclone copy "b2:${B2_BUCKET}/openwrt-feed/${d}/" "r2:${R2_BUCKET}/openwrt-feed/${d}/" \
              --checksum --fast-list --transfers 16 --checkers 32 --stats 30s --stats-one-line
            echo "--- verify $d counts ---"
            echo -n "B2 $d: "; rclone size "b2:${B2_BUCKET}/openwrt-feed/${d}/" --json
            echo -n "R2 $d: "; rclone size "r2:${R2_BUCKET}/openwrt-feed/${d}/" --json
          done
