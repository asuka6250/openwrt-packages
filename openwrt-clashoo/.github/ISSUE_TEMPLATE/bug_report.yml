name: Bug Report / BUG 反馈
description: Report a reproducible Clashoo issue / 反馈可复现的 Clashoo 问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-check / 提交前自查
      description: Please confirm these items before submitting / 请先确认以下事项
      options:
        - label: I have searched existing issues / 我已经搜索过已有 Issue
          required: true
        - label: I am using the latest Clashoo release from this repository / 我正在使用本仓库发布的最新版 Clashoo
          required: true
        - label: I have stopped other proxy plugins where applicable / 如适用，我已停止其他代理插件
          required: false
        - label: I removed sensitive data from logs and configs / 我已移除日志和配置中的敏感信息
          required: true
  - type: dropdown
    id: core
    attributes:
      label: Core / 内核
      options:
        - mihomo
        - mihomo Smart
        - sing-box
        - unknown / 不确定
    validations:
      required: true
  - type: dropdown
    id: proxy_mode
    attributes:
      label: Proxy Mode / 代理模式
      options:
        - fake-ip
        - tun
        - mixed
        - redirect
        - not related / 无关
        - unknown / 不确定
    validations:
      required: true
  - type: input
    id: clashoo_version
    attributes:
      label: Clashoo Version / Clashoo 版本
      placeholder: "e.g. clashoo-2026.05.15~d2acf45-r1, luci-app-clashoo-1.23.12-r1"
    validations:
      required: true
  - type: input
    id: openwrt_version
    attributes:
      label: OpenWrt / ImmortalWrt Version / 系统版本
      placeholder: "e.g. ImmortalWrt 25.12 / OpenWrt 24.10"
    validations:
      required: true
  - type: input
    id: arch
    attributes:
      label: Architecture / 架构
      placeholder: "e.g. x86_64, aarch64_cortex-a53"
    validations:
      required: true
  - type: dropdown
    id: package_manager
    attributes:
      label: Package Manager / 包管理器
      options:
        - apk
        - opkg
        - unknown / 不确定
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description / 问题描述
      description: What happened? / 发生了什么？
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 预期行为
      description: What did you expect to happen? / 你期望它如何工作？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps / 复现步骤
      description: List exact steps to reproduce / 请列出可复现的具体步骤
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / 日志
      description: Attach LuCI logs, core logs, and relevant command output / 请附上 LuCI 日志、核心日志和相关命令输出
      render: shell
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant Config / 相关配置
      description: Paste only relevant and sanitized config / 只粘贴相关且已脱敏的配置
      render: yaml
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional Context / 补充信息
      description: Screenshots, network topology, DNS settings, or anything else useful / 截图、网络拓扑、DNS 设置或其他有用信息
    validations:
      required: false

