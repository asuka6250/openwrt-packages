name: Build SDK Packages

on:
  push:
    branches:
      - main
    paths:
      - net/lanspeedd/Makefile
      - applications/luci-app-lanspeed/Makefile
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.release.outputs.changed }}
      code_version: ${{ steps.release.outputs.code_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect version change and release state
        id: release
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          code_version="$(sh ./scripts/release-version.sh)"
          printf '%s\n' "$code_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-r[0-9]+$'

          if [ "$EVENT_NAME" = workflow_dispatch ]; then
            before="${GITHUB_SHA}^1"
          else
            before="$BEFORE_SHA"
          fi

          if [ "$before" = 0000000000000000000000000000000000000000 ]; then
            version_changed=true
          else
            if ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
              if [ "$EVENT_NAME" != push ]; then
                printf '%s\n' "error: comparison commit ${before} is unavailable for ${EVENT_NAME}" >&2
                exit 1
              fi
              git fetch --no-tags --depth=1 origin "$before"
            fi
            git cat-file -e "${before}^{commit}"
            before_dir="$(mktemp -d)"
            trap 'rm -rf "$before_dir"' EXIT
            git archive "$before" -- scripts/release-version.sh net/lanspeedd/Makefile applications/luci-app-lanspeed/Makefile | tar -x -C "$before_dir"
            before_version="$(sh "$before_dir/scripts/release-version.sh")"
            if [ "$before_version" = "$code_version" ]; then
              version_changed=false
            else
              version_changed=true
            fi
          fi

          release_tag="v${code_version}"
          tag_exists=false
          tag_query_status=0
          git ls-remote --exit-code --tags origin "refs/tags/${release_tag}" >/dev/null || tag_query_status=$?
          case "$tag_query_status" in
            0) tag_exists=true ;;
            2) tag_exists=false ;;
            *)
              printf '%s\n' "error: failed to query remote tag ${release_tag}: git ls-remote exit ${tag_query_status}" >&2
              exit "$tag_query_status"
              ;;
          esac
          releases_json="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" | jq -s 'add')"
          release_count="$(printf '%s' "$releases_json" | jq --arg tag "$release_tag" '[.[] | select(.tag_name == $tag)] | length')"
          expected_assets_json="$(jq -nc --arg version "$code_version" '[
            "lanspeedd-\($version).apk",
            "lanspeedd-bpf-\($version).apk",
            "luci-app-lanspeed-\($version).apk",
            "lanspeedd-\($version)-aarch64.apk",
            "lanspeedd-bpf-\($version)-aarch64.apk",
            "luci-app-lanspeed-\($version)-aarch64.apk"
          ] | sort')"
          complete_count="$(printf '%s' "$releases_json" | jq \
            --arg tag "$release_tag" \
            --argjson expected "$expected_assets_json" \
            '[
              .[]
              | select(.tag_name == $tag and .draft == false and .prerelease == false)
              | select(([.assets[].name] | sort) == $expected)
              | select(all(.assets[]; .state == "uploaded"))
              | select(all(.assets[]; ((.digest // "") | test("^sha256:[0-9a-f]{64}$"))))
            ] | length')"

          if [ "$tag_exists" = false ] && [ "$release_count" -eq 0 ]; then
            changed="$version_changed"
          elif [ "$tag_exists" = true ] && [ "$release_count" -eq 1 ] && [ "$complete_count" -eq 1 ]; then
            changed=false
          else
            printf '%s\n' "error: incomplete or inconsistent release state for ${release_tag}: tag_exists=${tag_exists} release_count=${release_count} complete_count=${complete_count}; expected exactly one published non-prerelease Release with six uploaded SHA256 assets" >&2
            exit 1
          fi

          printf 'changed=%s\n' "$changed" >> "$GITHUB_OUTPUT"
          printf 'code_version=%s\n' "$code_version" >> "$GITHUB_OUTPUT"
          printf 'release_tag=%s\n' "$release_tag" >> "$GITHUB_OUTPUT"

  validate:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install validation prerequisites
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo apt-get -o Acquire::Retries=3 install -y build-essential clang curl jq libelf-dev zstd

      - name: Install verified Rust toolchain and bpf-linker
        shell: bash
        run: |
          set -euo pipefail
          export RUSTUP_MAX_RETRIES=3
          rustup toolchain install 1.96.0 --profile minimal --component rust-src
          rustup default 1.96.0

          bpf_linker_url=https://github.com/aya-rs/bpf-linker/releases/download/v0.10.3/bpf-linker-x86_64-unknown-linux-musl.tar.gz
          bpf_linker_sha256=0fa4645d2dfbb5cafe6231b0aa9fad4f1430bd0871e3bd7319e82d827bf6262c
          bpf_linker_archive="$RUNNER_TEMP/bpf-linker-0.10.3.tar.gz"
          curl --fail --location --retry 3 --retry-all-errors "$bpf_linker_url" --output "$bpf_linker_archive"
          printf '%s  %s\n' "$bpf_linker_sha256" "$bpf_linker_archive" | sha256sum -c -
          mkdir -p "$HOME/.cargo/bin"
          tar -xzf "$bpf_linker_archive" -C "$HOME/.cargo/bin"
          test "$(bpf-linker --version)" = 'bpf-linker 0.10.3'

      - name: Run unit validations
        run: ./tests/run.sh unit

  build:
    needs:
      - detect
      - validate
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: x86_64
            sdk_url: https://downloads.immortalwrt.org/releases/25.12.1/targets/x86/64/immortalwrt-sdk-25.12.1-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            sdk_sha256: 02ad8cfc775001ccae8e9282d19696de54e3ab3963f005737ad61f8698263edd
            suffix: ''
            artifact: lanspeed-apk-x86_64
          - id: aarch64
            sdk_url: https://downloads.immortalwrt.org/releases/25.12.1/targets/armsr/armv8/immortalwrt-sdk-25.12.1-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            sdk_sha256: 1ac4a0940328ebbb71c5e2e44bd798d9acc06b99dc417178fe9868e5e91a0ef5
            suffix: -aarch64
            artifact: lanspeed-apk-aarch64
    env:
      SDK_SHA256: ${{ matrix.sdk_sha256 }}
      SDK_URL: ${{ matrix.sdk_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install build prerequisites
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo apt-get -o Acquire::Retries=3 install -y build-essential clang curl flex g++ gawk gcc-multilib gettext git jq libelf-dev libncurses5-dev libssl-dev python3 rsync unzip xz-utils zlib1g-dev zstd

      - name: Download and verify SDK
        shell: bash
        run: |
          set -euo pipefail

          sdk_archive="$RUNNER_TEMP/sdk-${{ matrix.id }}.tar.zst"
          base_sdk="$RUNNER_TEMP/sdk-base-${{ matrix.id }}"
          bpf_sdk="$RUNNER_TEMP/sdk-bpf-${{ matrix.id }}"

          curl --fail --location --retry 3 --retry-all-errors "$SDK_URL" --output "$sdk_archive"
          printf '%s  %s\n' "$SDK_SHA256" "$sdk_archive" | sha256sum -c -

          mkdir -p "$base_sdk" "$bpf_sdk"
          tar --zstd -xf "$sdk_archive" -C "$base_sdk" --strip-components=1
          rm -f "$sdk_archive"
          cp -a "$base_sdk/." "$bpf_sdk/"

      - name: Build base and BPF packages concurrently
        shell: bash
        run: |
          set -euo pipefail

          base_sdk="$RUNNER_TEMP/sdk-base-${{ matrix.id }}"
          bpf_sdk="$RUNNER_TEMP/sdk-bpf-${{ matrix.id }}"

          (
            set -o pipefail
            ENABLE_BPF=0 SDK_RELEASE=25.12 SDK_DIR="$base_sdk" ./scripts/build-sdk.sh lanspeedd 2>&1 | sed -u 's/^/[base] /'
          ) &
          base_pid=$!

          (
            set -o pipefail
            ENABLE_BPF=1 SDK_RELEASE=25.12 SDK_DIR="$bpf_sdk" ./scripts/build-sdk.sh all 2>&1 | sed -u 's/^/[bpf] /'
          ) &
          bpf_pid=$!

          status=0
          if ! wait "$base_pid"; then
            printf '%s\n' 'error: base SDK build failed' >&2
            status=1
          fi
          if ! wait "$bpf_pid"; then
            printf '%s\n' 'error: BPF SDK build failed' >&2
            status=1
          fi
          exit "$status"

      - name: Collect architecture artifact
        shell: bash
        run: |
          set -euo pipefail

          code_version="${{ needs.detect.outputs.code_version }}"
          suffix="${{ matrix.suffix }}"
          base_sdk="$RUNNER_TEMP/sdk-base-${{ matrix.id }}"
          bpf_sdk="$RUNNER_TEMP/sdk-bpf-${{ matrix.id }}"
          artifact_dir="$RUNNER_TEMP/artifact-${{ matrix.id }}"
          mkdir -p "$artifact_dir"

          collect_one() {
            local sdk_dir=$1
            local pattern=$2
            local asset_name=$3
            local candidate
            local found=
            local candidates=()

            shopt -s nullglob
            candidates=(
              "$sdk_dir"/bin/packages/*/lanspeed/"$pattern"
              "$sdk_dir"/bin/packages/*/base/"$pattern"
            )
            shopt -u nullglob

            for candidate in "${candidates[@]}"; do
              if [ -n "$found" ]; then
                printf '%s\n' "error: multiple release packages match ${pattern} in ${sdk_dir}/bin" >&2
                exit 1
              fi
              found=$candidate
            done
            if [ -z "$found" ]; then
              printf '%s\n' "error: missing release package ${pattern} in ${sdk_dir}/bin" >&2
              exit 1
            fi
            cp "$found" "$artifact_dir/$asset_name"
          }

          collect_one "$base_sdk" "lanspeedd-${code_version}.apk" "lanspeedd-${code_version}${suffix}.apk"
          collect_one "$bpf_sdk" "lanspeedd-bpf-${code_version}.apk" "lanspeedd-bpf-${code_version}${suffix}.apk"
          collect_one "$bpf_sdk" "luci-app-lanspeed-${code_version}.apk" "luci-app-lanspeed-${code_version}${suffix}.apk"

          file_count="$(find "$artifact_dir" -maxdepth 1 -type f | wc -l)"
          if [ "$file_count" -ne 3 ]; then
            printf '%s\n' "error: expected exactly three APK files, found ${file_count}" >&2
            exit 1
          fi

      - name: Upload architecture artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ runner.temp }}/artifact-${{ matrix.id }}/*.apk
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    needs:
      - detect
      - build
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: lanspeed-apk-x86_64
          path: ${{ runner.temp }}/release

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: lanspeed-apk-aarch64
          path: ${{ runner.temp }}/release

      - name: Validate exact release assets
        shell: bash
        env:
          CODE_VERSION: ${{ needs.detect.outputs.code_version }}
        run: |
          set -euo pipefail

          release_dir="$RUNNER_TEMP/release"
          expected_files="$RUNNER_TEMP/expected-release-files.txt"
          actual_files="$RUNNER_TEMP/actual-release-files.txt"

          printf '%s\n' \
            "lanspeedd-${CODE_VERSION}.apk" \
            "lanspeedd-bpf-${CODE_VERSION}.apk" \
            "luci-app-lanspeed-${CODE_VERSION}.apk" \
            "lanspeedd-${CODE_VERSION}-aarch64.apk" \
            "lanspeedd-bpf-${CODE_VERSION}-aarch64.apk" \
            "luci-app-lanspeed-${CODE_VERSION}-aarch64.apk" \
            | sort > "$expected_files"
          find "$release_dir" -maxdepth 1 -type f -printf '%f\n' | sort > "$actual_files"

          if ! diff -u "$expected_files" "$actual_files"; then
            printf '%s\n' 'error: release directory must contain exactly the six expected APK files' >&2
            exit 1
          fi

      - name: Create and push release tag
        shell: bash
        env:
          CODE_VERSION: ${{ needs.detect.outputs.code_version }}
        run: |
          set -euo pipefail
          release_tag="v${CODE_VERSION}"
          git tag "$release_tag" "$GITHUB_SHA"
          git push origin "refs/tags/${release_tag}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3.0.2
        with:
          name: ${{ needs.detect.outputs.code_version }}
          tag_name: v${{ needs.detect.outputs.code_version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: false
          files: |
            ${{ runner.temp }}/release/lanspeedd-${{ needs.detect.outputs.code_version }}.apk
            ${{ runner.temp }}/release/lanspeedd-bpf-${{ needs.detect.outputs.code_version }}.apk
            ${{ runner.temp }}/release/luci-app-lanspeed-${{ needs.detect.outputs.code_version }}.apk
            ${{ runner.temp }}/release/lanspeedd-${{ needs.detect.outputs.code_version }}-aarch64.apk
            ${{ runner.temp }}/release/lanspeedd-bpf-${{ needs.detect.outputs.code_version }}-aarch64.apk
            ${{ runner.temp }}/release/luci-app-lanspeed-${{ needs.detect.outputs.code_version }}-aarch64.apk
