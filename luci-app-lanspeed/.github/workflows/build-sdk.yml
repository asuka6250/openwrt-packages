name: Build SDK Packages

on:
  push:
    branches:
      - main
    paths:
      - 'net/lanspeedd/Makefile'
      - 'applications/luci-app-lanspeed/Makefile'

permissions:
  contents: read

env:
  APK_SDK_URL: https://downloads.immortalwrt.org/releases/25.12.0-rc2/targets/x86/64/immortalwrt-sdk-25.12.0-rc2-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
  APK_SDK_SHA256: fb665aabb627d3b3a7d98cd426ee90febdb84ceffa6ce4c18fbda934c46053d5
  APK_AARCH64_SDK_URL: https://downloads.immortalwrt.org/releases/25.12.0-rc2/targets/armsr/armv8/immortalwrt-sdk-25.12.0-rc2-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst
  APK_AARCH64_SDK_SHA256: 8fd6e4177ad99b567035cbc2825dd060773556249831fad5560cb1ef9eb1e290

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      code_version: ${{ steps.version.outputs.code_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          code_version="$(sh ./scripts/release-version.sh)"
          if ! printf '%s\n' "$code_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-r[0-9]+$'; then
            printf '%s\n' "error: invalid release version $code_version" >&2
            exit 1
          fi
          before="${{ github.event.before }}"
          changed=false

          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            changed=true
          else
            before_dir="$(mktemp -d)"
            trap 'rm -rf "$before_dir"' EXIT
            git archive "$before" -- scripts/release-version.sh net/lanspeedd/Makefile applications/luci-app-lanspeed/Makefile | tar -x -C "$before_dir"
            before_version="$(sh "$before_dir/scripts/release-version.sh")"
            if [ "$before_version" != "$code_version" ]; then
              changed=true
            fi
          fi

          printf 'changed=%s\n' "$changed" >> "$GITHUB_OUTPUT"
          printf 'code_version=%s\n' "$code_version" >> "$GITHUB_OUTPUT"

  release:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3 rsync unzip wget xz-utils zlib1g-dev zstd

      - name: Prepare Rust toolchain 1.96.0
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component rust-src
          rustup default 1.96.0

      - name: Install bpf-linker 0.10.3
        run: |
          archive="$RUNNER_TEMP/bpf-linker-0.10.3-x86_64-unknown-linux-musl.tar.gz"
          tool_dir="$RUNNER_TEMP/bpf-linker-0.10.3"
          curl -L "https://github.com/aya-rs/bpf-linker/releases/download/v0.10.3/bpf-linker-x86_64-unknown-linux-musl.tar.gz" -o "$archive"
          printf '%s  %s\n' "0fa4645d2dfbb5cafe6231b0aa9fad4f1430bd0871e3bd7319e82d827bf6262c" "$archive" | sha256sum -c -
          mkdir -p "$tool_dir"
          tar -xzf "$archive" -C "$tool_dir"
          bpf_linker="$(find "$tool_dir" -type f -name bpf-linker -perm -u+x -print -quit)"
          if [ -z "$bpf_linker" ]; then
            printf '%s\n' "error: bpf-linker archive did not contain an executable" >&2
            exit 1
          fi
          printf '%s\n' "$(dirname "$bpf_linker")" >> "$GITHUB_PATH"

      - name: Run unit validations
        run: ./tests/run.sh unit

      - name: Download public SDKs
        run: |
          mkdir -p "$RUNNER_TEMP/sdk-apk-base"
          curl -L "$APK_SDK_URL" -o "$RUNNER_TEMP/sdk-apk-base/sdk.tar.zst"
          printf '%s  %s\n' "$APK_SDK_SHA256" "$RUNNER_TEMP/sdk-apk-base/sdk.tar.zst" | sha256sum -c -
          tar --zstd -xf "$RUNNER_TEMP/sdk-apk-base/sdk.tar.zst" -C "$RUNNER_TEMP/sdk-apk-base" --strip-components=1

          mkdir -p "$RUNNER_TEMP/sdk-apk-bpf"
          cp -a "$RUNNER_TEMP/sdk-apk-base/." "$RUNNER_TEMP/sdk-apk-bpf/"

          mkdir -p "$RUNNER_TEMP/sdk-apk-aarch64-base"
          curl -L "$APK_AARCH64_SDK_URL" -o "$RUNNER_TEMP/sdk-apk-aarch64-base/sdk.tar.zst"
          printf '%s  %s\n' "$APK_AARCH64_SDK_SHA256" "$RUNNER_TEMP/sdk-apk-aarch64-base/sdk.tar.zst" | sha256sum -c -
          tar --zstd -xf "$RUNNER_TEMP/sdk-apk-aarch64-base/sdk.tar.zst" -C "$RUNNER_TEMP/sdk-apk-aarch64-base" --strip-components=1

          mkdir -p "$RUNNER_TEMP/sdk-apk-aarch64-bpf"
          cp -a "$RUNNER_TEMP/sdk-apk-aarch64-base/." "$RUNNER_TEMP/sdk-apk-aarch64-bpf/"

      - name: Build SDK packages
        run: |
          umask 022

          run_build() {
            name=$1
            sdk_dir=$2
            enable_bpf=$3
            sdk_release=$4
            target=$5
            log_file="$RUNNER_TEMP/${name}.log"
            (
              ENABLE_BPF="$enable_bpf" SDK_RELEASE="$sdk_release" SDK_DIR="$sdk_dir" ./scripts/build-sdk.sh "$target"
            ) > "$log_file" 2>&1 &
            printf '%s %s %s\n' "$!" "$name" "$log_file" >> "$RUNNER_TEMP/build-pids.txt"
          }

          : > "$RUNNER_TEMP/build-pids.txt"
          run_build apk-base "$RUNNER_TEMP/sdk-apk-base" 0 25.12 lanspeedd
          run_build apk-bpf "$RUNNER_TEMP/sdk-apk-bpf" 1 25.12 all
          run_build apk-aarch64-base "$RUNNER_TEMP/sdk-apk-aarch64-base" 0 25.12 lanspeedd
          run_build apk-aarch64-bpf "$RUNNER_TEMP/sdk-apk-aarch64-bpf" 1 25.12 all

          status=0
          while read -r pid name log_file; do
            if wait "$pid"; then
              printf '%s\n' "build ok: $name"
            else
              rc=$?
              printf '%s\n' "build failed: $name exit=$rc" >&2
              sed 's/^/  /' "$log_file" >&2
              status=1
            fi
          done < "$RUNNER_TEMP/build-pids.txt"
          exit "$status"

      - name: Collect release files
        id: release_files
        env:
          CODE_VERSION: ${{ needs.detect.outputs.code_version }}
        run: |
          code_version="$CODE_VERSION"
          release_dir="$RUNNER_TEMP/release/files"
          file_list="$RUNNER_TEMP/release/files.txt"
          mkdir -p "$release_dir"
          : > "$file_list"

          collect_one() {
            sdk_dir=$1
            pattern=$2
            asset_name=${3:-}
            source_file=
            match_count=0
            for file in "$sdk_dir"/bin/packages/*/lanspeed/$pattern "$sdk_dir"/bin/packages/*/base/$pattern; do
              [ -f "$file" ] || continue
              source_file=$file
              match_count=$((match_count + 1))
            done
            if [ "$match_count" -ne 1 ]; then
              printf '%s\n' "error: expected exactly one release package $pattern in $sdk_dir/bin, found $match_count" >&2
              exit 1
            fi
            if [ -n "$asset_name" ]; then
              output_name=$asset_name
            else
              output_name=$(basename "$source_file")
            fi
            if [ -e "$release_dir/$output_name" ]; then
              printf '%s\n' "error: duplicate release asset name $output_name" >&2
              exit 1
            fi
            cp "$source_file" "$release_dir/$output_name"
            printf '%s/%s\n' "$release_dir" "$output_name" >> "$file_list"
          }

          collect_one "$RUNNER_TEMP/sdk-apk-base" "lanspeedd-${code_version}.apk"
          collect_one "$RUNNER_TEMP/sdk-apk-bpf" "lanspeedd-bpf-${code_version}.apk"
          collect_one "$RUNNER_TEMP/sdk-apk-bpf" "luci-app-lanspeed-${code_version}.apk"
          collect_one "$RUNNER_TEMP/sdk-apk-aarch64-base" "lanspeedd-${code_version}.apk" "lanspeedd-${code_version}-aarch64.apk"
          collect_one "$RUNNER_TEMP/sdk-apk-aarch64-bpf" "lanspeedd-bpf-${code_version}.apk" "lanspeedd-bpf-${code_version}-aarch64.apk"
          collect_one "$RUNNER_TEMP/sdk-apk-aarch64-bpf" "luci-app-lanspeed-${code_version}.apk" "luci-app-lanspeed-${code_version}-aarch64.apk"

          asset_count=$(wc -l < "$file_list")
          unique_asset_count=$(sed 's#.*/##' "$file_list" | sort -u | wc -l)
          if [ "$asset_count" -ne 6 ] || [ "$unique_asset_count" -ne 6 ]; then
            printf '%s\n' "error: expected six unique release assets, found $asset_count files and $unique_asset_count basenames" >&2
            exit 1
          fi
          {
            printf 'files<<EOF\n'
            cat "$file_list"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        env:
          RELEASE_TAG: v${{ needs.detect.outputs.code_version }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}" >/dev/null; then
            printf '%s\n' "error: release tag ${RELEASE_TAG} already exists" >&2
            exit 1
          fi
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2.6.2
        with:
          name: ${{ needs.detect.outputs.code_version }}
          tag_name: v${{ needs.detect.outputs.code_version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: false
          files: ${{ steps.release_files.outputs.files }}
