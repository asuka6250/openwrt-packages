name: Build SDK Packages

on:
  push:
    branches:
      - main
    paths:
      - net/lanspeedd/Makefile
      - applications/luci-app-lanspeed/Makefile
      - scripts/build-sdk.sh
      - scripts/sdk-rust-identity.sh
      - scripts/release-version.sh
      - tests/validate-sdk-apks.sh
      - tests/validate-rust-ebpf-objects.sh
      - .github/workflows/build-sdk.yml
  workflow_dispatch:

concurrency:
  group: lanspeed-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      changed: ${{ steps.release.outputs.changed }}
      code_version: ${{ steps.release.outputs.code_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect release state
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          code_version="$(sh ./scripts/release-version.sh)"
          printf '%s\n' "$code_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-r[0-9]+$'

          release_tag="v${code_version}"
          tag_exists=false
          tag_target=
          tag_refs=
          tag_query_status=0
          tag_refs="$(git ls-remote --exit-code --tags origin \
            "refs/tags/${release_tag}" "refs/tags/${release_tag}^{}")" || tag_query_status=$?
          case "$tag_query_status" in
            0)
              tag_exists=true
              tag_target="$(printf '%s\n' "$tag_refs" | awk -v peeled="refs/tags/${release_tag}^{}" \
                '$2 == peeled { print $1; found=1 } END { if (!found) exit 1 }' 2>/dev/null || true)"
              if [ -z "$tag_target" ]; then
                tag_target="$(printf '%s\n' "$tag_refs" | awk -v direct="refs/tags/${release_tag}" \
                  '$2 == direct { print $1; exit }')"
              fi
              [ -n "$tag_target" ]
              ;;
            2) tag_exists=false ;;
            *)
              printf '%s\n' "error: failed to query remote tag ${release_tag}: git ls-remote exit ${tag_query_status}" >&2
              exit "$tag_query_status"
              ;;
          esac
          releases_json="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" | jq -s 'add')"
          release_count="$(printf '%s' "$releases_json" | jq --arg tag "$release_tag" '[.[] | select(.tag_name == $tag)] | length')"
          draft_count="$(printf '%s' "$releases_json" | jq --arg tag "$release_tag" '[.[] | select(.tag_name == $tag and .draft == true)] | length')"
          draft_target_count="$(printf '%s' "$releases_json" | jq --arg tag "$release_tag" --arg sha "$GITHUB_SHA" \
            '[.[] | select(.tag_name == $tag and .draft == true and .target_commitish == $sha)] | length')"
          expected_assets_json="$(jq -nc --arg version "$code_version" '[
            "lanspeedd-\($version).apk",
            "lanspeedd-bpf-\($version).apk",
            "luci-app-lanspeed-\($version).apk",
            "lanspeedd-\($version)-aarch64.apk",
            "lanspeedd-bpf-\($version)-aarch64.apk",
            "luci-app-lanspeed-\($version)-aarch64.apk"
          ] | sort')"
          complete_count="$(printf '%s' "$releases_json" | jq \
            --arg tag "$release_tag" \
            --argjson expected "$expected_assets_json" \
            '[
              .[]
              | select(.tag_name == $tag and .draft == false and .prerelease == false)
              | select(([.assets[].name] | sort) == $expected)
              | select(all(.assets[]; .state == "uploaded"))
              | select(all(.assets[]; ((.digest // "") | test("^sha256:[0-9a-f]{64}$"))))
            ] | length')"

          if [ "$tag_exists" = true ] && [ "$release_count" -eq 1 ] && [ "$complete_count" -eq 1 ]; then
            changed=false
          elif [ "$tag_exists" = true ] && [ "$tag_target" != "$GITHUB_SHA" ]; then
            printf '%s\n' "error: incomplete release tag ${release_tag} points to ${tag_target}, expected ${GITHUB_SHA}" >&2
            exit 1
          elif [ "$tag_exists" = true ] && [ "$release_count" -eq 0 ]; then
            changed=true
          elif [ "$release_count" -eq 0 ]; then
            changed=true
          elif [ "$release_count" -eq 1 ] && [ "$draft_count" -eq 1 ] && \
            { [ "$tag_exists" = true ] || [ "$draft_target_count" -eq 1 ]; }; then
            changed=true
          else
            printf '%s\n' "error: unrecoverable release state for ${release_tag}: tag_exists=${tag_exists} tag_target=${tag_target:-none} release_count=${release_count} draft_count=${draft_count} complete_count=${complete_count}" >&2
            exit 1
          fi

          printf 'changed=%s\n' "$changed" >> "$GITHUB_OUTPUT"
          printf 'code_version=%s\n' "$code_version" >> "$GITHUB_OUTPUT"
          printf 'release_tag=%s\n' "$release_tag" >> "$GITHUB_OUTPUT"

  validate:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Install validation prerequisites
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo apt-get -o Acquire::Retries=3 install -y build-essential clang curl jq libelf-dev zstd

      - name: Install verified Rust toolchain and bpf-linker
        shell: bash
        run: |
          set -euo pipefail
          export RUSTUP_MAX_RETRIES=3
          rustup toolchain install 1.96.0 --profile minimal --component rust-src
          rustup default 1.96.0

          bpf_linker_url=https://github.com/aya-rs/bpf-linker/releases/download/v0.10.3/bpf-linker-x86_64-unknown-linux-musl.tar.gz
          bpf_linker_sha256=0fa4645d2dfbb5cafe6231b0aa9fad4f1430bd0871e3bd7319e82d827bf6262c
          bpf_linker_archive="$RUNNER_TEMP/bpf-linker-0.10.3.tar.gz"
          curl --fail --location --retry 3 --retry-all-errors "$bpf_linker_url" --output "$bpf_linker_archive"
          printf '%s  %s\n' "$bpf_linker_sha256" "$bpf_linker_archive" | sha256sum -c -
          mkdir -p "$HOME/.cargo/bin"
          tar -xzf "$bpf_linker_archive" -C "$HOME/.cargo/bin"
          test "$(bpf-linker --version)" = 'bpf-linker 0.10.3'

      - name: Run unit validations
        run: ./tests/run.sh unit

  build:
    needs:
      - detect
      - validate
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: x86_64
            target_arch: x86_64
            package_arch: x86_64
            sdk_url: https://downloads.immortalwrt.org/releases/25.12.1/targets/x86/64/immortalwrt-sdk-25.12.1-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            sdk_sha256: 02ad8cfc775001ccae8e9282d19696de54e3ab3963f005737ad61f8698263edd
            suffix: ''
            artifact: lanspeed-apk-x86_64
          - id: aarch64
            target_arch: aarch64
            package_arch: aarch64_generic
            sdk_url: https://downloads.immortalwrt.org/releases/25.12.1/targets/armsr/armv8/immortalwrt-sdk-25.12.1-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            sdk_sha256: 1ac4a0940328ebbb71c5e2e44bd798d9acc06b99dc417178fe9868e5e91a0ef5
            suffix: -aarch64
            artifact: lanspeed-apk-aarch64
    env:
      SDK_SHA256: ${{ matrix.sdk_sha256 }}
      SDK_URL: ${{ matrix.sdk_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install build prerequisites
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo apt-get -o Acquire::Retries=3 install -y build-essential clang curl flex g++ gawk gcc-multilib gettext git jq libelf-dev libncurses5-dev libssl-dev llvm python3 rsync unzip xz-utils zlib1g-dev zstd

      - name: Download and verify SDK
        shell: bash
        run: |
          set -euo pipefail

          sdk_archive="$RUNNER_TEMP/sdk-${{ matrix.id }}.tar.zst"
          base_sdk="$RUNNER_TEMP/sdk-base-${{ matrix.id }}"

          curl --fail --location --retry 3 --retry-all-errors "$SDK_URL" --output "$sdk_archive"
          printf '%s  %s\n' "$SDK_SHA256" "$sdk_archive" | sha256sum -c -

          mkdir -p "$base_sdk"
          tar --zstd -xf "$sdk_archive" -C "$base_sdk" --strip-components=1
          rm -f "$sdk_archive"

      - name: Resolve SDK feed and Rust identity
        id: sdk-identity
        shell: bash
        env:
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: |
          set -euo pipefail

          base_sdk="$RUNNER_TEMP/sdk-base-${{ matrix.id }}"
          TARGET_ARCH="$TARGET_ARCH" SDK_RELEASE=25.12 SDK_DIR="$base_sdk" ENABLE_BPF=0 \
            ./scripts/build-sdk.sh prepare-feeds 2>&1 | sed -u 's/^/[feeds] /'

          identity="$(./scripts/sdk-rust-identity.sh measure "$base_sdk")"
          feeds_hash="$(printf '%s\n' "$identity" | sed -n 's/^feeds_hash=//p')"
          rust_version="$(printf '%s\n' "$identity" | sed -n 's/^rust_version=//p')"
          rust_recipe_hash="$(printf '%s\n' "$identity" | sed -n 's/^rust_recipe_hash=//p')"
          printf '%s\n' "$identity" >> "$GITHUB_OUTPUT"
          printf 'SDK identity: target_arch=%s feeds_hash=%s rust_version=%s rust_recipe_hash=%s\n' \
            "$TARGET_ARCH" "$feeds_hash" "$rust_version" "$rust_recipe_hash"

      - name: Restore SDK Rust host cache
        id: sdk-rust-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/dl/cargo
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/dl/rustc
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/dl/rustc-*.tar.xz
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/staging_dir/hostpkg/stamp/.rust_installed
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/staging_dir/target-*/host
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/build_dir/target-*/host/rustc-*/.built*
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/build_dir/target-*/host/rustc-*/.configured
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/build_dir/target-*/host/rustc-*/.prepared*
          key: lanspeed-sdk-rust-v2-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target_arch }}-${{ matrix.sdk_sha256 }}-feeds-${{ steps.sdk-identity.outputs.feeds_hash }}-rust-${{ steps.sdk-identity.outputs.rust_version }}-recipe-${{ steps.sdk-identity.outputs.rust_recipe_hash }}

      - name: Build base package
        shell: bash
        run: |
          set -euo pipefail

          base_sdk="$RUNNER_TEMP/sdk-base-${{ matrix.id }}"

          set -o pipefail
          ENABLE_BPF=0 SDK_RELEASE=25.12 SDK_DIR="$base_sdk" SDK_FEEDS_PREPARED=1 \
            SDK_FEEDS_HASH="${{ steps.sdk-identity.outputs.feeds_hash }}" \
            SDK_RUST_VERSION="${{ steps.sdk-identity.outputs.rust_version }}" \
            SDK_RUST_RECIPE_HASH="${{ steps.sdk-identity.outputs.rust_recipe_hash }}" \
            TARGET_ARCH="${{ matrix.target_arch }}" \
            ./scripts/build-sdk.sh lanspeedd 2>&1 | sed -u 's/^/[base] /'

      - name: Prune SDK Rust build tree
        shell: bash
        run: |
          set -euo pipefail

          base_sdk="$RUNNER_TEMP/sdk-base-${{ matrix.id }}"
          rustc_path="$(find "$base_sdk/staging_dir" -path '*/host/bin/rustc' -type f -perm -u+x -print -quit)"
          cargo_path="$(find "$base_sdk/staging_dir" -path '*/host/bin/cargo' -type f -perm -u+x -print -quit)"
          if [ -z "$rustc_path" ] || [ -z "$cargo_path" ]; then
            printf '%s\n' 'error: base SDK build did not install the Rust host toolchain' >&2
            exit 1
          fi
          expected_rust="${{ steps.sdk-identity.outputs.rust_version }}"
          rustc_release="$("$rustc_path" --version --verbose | sed -n 's/^release: //p')"
          cargo_release="$("$cargo_path" --version | awk 'NR == 1 { print $2 }')"
          if [ "$rustc_release" != "$expected_rust" ]; then
            printf '%s\n' "error: SDK rustc release $rustc_release does not match recipe $expected_rust" >&2
            exit 1
          fi
          printf '%s\n' "$cargo_release" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            printf '%s\n' "error: SDK cargo returned an invalid version: $cargo_release" >&2
            exit 1
          }
          printf 'SDK Rust host toolchain: rustc=%s cargo=%s\n' "$rustc_release" "$cargo_release"

          shopt -s nullglob
          rust_builds=("$base_sdk"/build_dir/target-*/host/rustc-*)
          shopt -u nullglob
          if [ "${#rust_builds[@]}" -ne 1 ]; then
            printf '%s\n' "error: expected one Rust host build tree, found ${#rust_builds[@]}" >&2
            exit 1
          fi
          find "${rust_builds[0]}" -mindepth 1 -maxdepth 1 \
            ! -name '.built' \
            ! -name '.built_check' \
            ! -name '.configured' \
            ! -name '.prepared*' \
            -exec rm -rf {} +

      - name: Save SDK Rust host cache
        if: steps.sdk-rust-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/dl/cargo
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/dl/rustc
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/dl/rustc-*.tar.xz
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/staging_dir/hostpkg/stamp/.rust_installed
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/staging_dir/target-*/host
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/build_dir/target-*/host/rustc-*/.built*
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/build_dir/target-*/host/rustc-*/.configured
            ${{ runner.temp }}/sdk-base-${{ matrix.id }}/build_dir/target-*/host/rustc-*/.prepared*
          key: lanspeed-sdk-rust-v2-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target_arch }}-${{ matrix.sdk_sha256 }}-feeds-${{ steps.sdk-identity.outputs.feeds_hash }}-rust-${{ steps.sdk-identity.outputs.rust_version }}-recipe-${{ steps.sdk-identity.outputs.rust_recipe_hash }}

      - name: Clone prepared SDK for BPF build
        shell: bash
        run: |
          set -euo pipefail

          base_sdk="$RUNNER_TEMP/sdk-base-${{ matrix.id }}"
          bpf_sdk="$RUNNER_TEMP/sdk-bpf-${{ matrix.id }}"
          mkdir -p "$bpf_sdk"
          cp -a "$base_sdk/." "$bpf_sdk/"

      - name: Build BPF packages
        shell: bash
        run: |
          set -euo pipefail

          bpf_sdk="$RUNNER_TEMP/sdk-bpf-${{ matrix.id }}"
          set -o pipefail
          ENABLE_BPF=1 SDK_RELEASE=25.12 SDK_DIR="$bpf_sdk" SDK_FEEDS_PREPARED=1 \
            SDK_FEEDS_HASH="${{ steps.sdk-identity.outputs.feeds_hash }}" \
            SDK_RUST_VERSION="${{ steps.sdk-identity.outputs.rust_version }}" \
            SDK_RUST_RECIPE_HASH="${{ steps.sdk-identity.outputs.rust_recipe_hash }}" \
            TARGET_ARCH="${{ matrix.target_arch }}" \
            ./scripts/build-sdk.sh all 2>&1 | sed -u 's/^/[bpf] /'

      - name: Collect architecture artifact
        shell: bash
        run: |
          set -euo pipefail

          code_version="${{ needs.detect.outputs.code_version }}"
          suffix="${{ matrix.suffix }}"
          base_sdk="$RUNNER_TEMP/sdk-base-${{ matrix.id }}"
          bpf_sdk="$RUNNER_TEMP/sdk-bpf-${{ matrix.id }}"
          artifact_dir="$RUNNER_TEMP/artifact-${{ matrix.id }}"
          mkdir -p "$artifact_dir"

          collect_one() {
            local sdk_dir=$1
            local pattern=$2
            local asset_name=$3
            local candidate
            local found=
            local candidates=()

            shopt -s nullglob
            candidates=(
              "$sdk_dir"/bin/packages/*/lanspeed/"$pattern"
              "$sdk_dir"/bin/packages/*/base/"$pattern"
            )
            shopt -u nullglob

            for candidate in "${candidates[@]}"; do
              if [ -n "$found" ]; then
                printf '%s\n' "error: multiple release packages match ${pattern} in ${sdk_dir}/bin" >&2
                exit 1
              fi
              found=$candidate
            done
            if [ -z "$found" ]; then
              printf '%s\n' "error: missing release package ${pattern} in ${sdk_dir}/bin" >&2
              exit 1
            fi
            cp "$found" "$artifact_dir/$asset_name"
          }

          collect_one "$base_sdk" "lanspeedd-${code_version}.apk" "lanspeedd-${code_version}${suffix}.apk"
          collect_one "$bpf_sdk" "lanspeedd-bpf-${code_version}.apk" "lanspeedd-bpf-${code_version}${suffix}.apk"
          collect_one "$bpf_sdk" "luci-app-lanspeed-${code_version}.apk" "luci-app-lanspeed-${code_version}${suffix}.apk"

          file_count="$(find "$artifact_dir" -maxdepth 1 -type f | wc -l)"
          if [ "$file_count" -ne 3 ]; then
            printf '%s\n' "error: expected exactly three APK files, found ${file_count}" >&2
            exit 1
          fi

      - name: Validate architecture APK contracts
        shell: bash
        run: |
          set -euo pipefail

          code_version="${{ needs.detect.outputs.code_version }}"
          suffix="${{ matrix.suffix }}"
          bpf_sdk="$RUNNER_TEMP/sdk-bpf-${{ matrix.id }}"
          artifact_dir="$RUNNER_TEMP/artifact-${{ matrix.id }}"
          ./tests/validate-sdk-apks.sh \
            "$bpf_sdk" \
            "${{ matrix.package_arch }}" \
            "$artifact_dir/lanspeedd-${code_version}${suffix}.apk" \
            "$artifact_dir/lanspeedd-bpf-${code_version}${suffix}.apk" \
            "$artifact_dir/luci-app-lanspeed-${code_version}${suffix}.apk"

      - name: Upload architecture artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ runner.temp }}/artifact-${{ matrix.id }}/*.apk
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    needs:
      - detect
      - build
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download x86_64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lanspeed-apk-x86_64
          path: ${{ runner.temp }}/release

      - name: Download aarch64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lanspeed-apk-aarch64
          path: ${{ runner.temp }}/release

      - name: Validate exact release assets
        shell: bash
        env:
          CODE_VERSION: ${{ needs.detect.outputs.code_version }}
        run: |
          set -euo pipefail

          release_dir="$RUNNER_TEMP/release"
          expected_files="$RUNNER_TEMP/expected-release-files.txt"
          actual_files="$RUNNER_TEMP/actual-release-files.txt"

          printf '%s\n' \
            "lanspeedd-${CODE_VERSION}.apk" \
            "lanspeedd-bpf-${CODE_VERSION}.apk" \
            "luci-app-lanspeed-${CODE_VERSION}.apk" \
            "lanspeedd-${CODE_VERSION}-aarch64.apk" \
            "lanspeedd-bpf-${CODE_VERSION}-aarch64.apk" \
            "luci-app-lanspeed-${CODE_VERSION}-aarch64.apk" \
            | sort > "$expected_files"
          find "$release_dir" -maxdepth 1 -type f -printf '%f\n' | sort > "$actual_files"

          if ! diff -u "$expected_files" "$actual_files"; then
            printf '%s\n' 'error: release directory must contain exactly the six expected APK files' >&2
            exit 1
          fi

      - name: Publish recoverable GitHub Release
        shell: bash
        env:
          CODE_VERSION: ${{ needs.detect.outputs.code_version }}
          RELEASE_TAG: ${{ needs.detect.outputs.release_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_dir="$RUNNER_TEMP/release"
          expected_assets_json="$(jq -nc --arg version "$CODE_VERSION" '[
            "lanspeedd-\($version).apk",
            "lanspeedd-bpf-\($version).apk",
            "luci-app-lanspeed-\($version).apk",
            "lanspeedd-\($version)-aarch64.apk",
            "lanspeedd-bpf-\($version)-aarch64.apk",
            "luci-app-lanspeed-\($version)-aarch64.apk"
          ] | sort')"

          tag_exists=false
          tag_refs=
          tag_query_status=0
          tag_refs="$(git ls-remote --exit-code --tags origin \
            "refs/tags/${RELEASE_TAG}" "refs/tags/${RELEASE_TAG}^{}")" || tag_query_status=$?
          case "$tag_query_status" in
            0)
              tag_exists=true
              tag_target="$(printf '%s\n' "$tag_refs" | awk -v peeled="refs/tags/${RELEASE_TAG}^{}" \
                '$2 == peeled { print $1; found=1 } END { if (!found) exit 1 }' 2>/dev/null || true)"
              if [ -z "$tag_target" ]; then
                tag_target="$(printf '%s\n' "$tag_refs" | awk -v direct="refs/tags/${RELEASE_TAG}" \
                  '$2 == direct { print $1; exit }')"
              fi
              if [ "$tag_target" != "$GITHUB_SHA" ]; then
                printf '%s\n' "error: release tag ${RELEASE_TAG} points to ${tag_target}, expected ${GITHUB_SHA}" >&2
                exit 1
              fi
              ;;
            2) ;;
            *)
              printf '%s\n' "error: failed to query remote tag ${RELEASE_TAG}: git ls-remote exit ${tag_query_status}" >&2
              exit "$tag_query_status"
              ;;
          esac

          releases_json="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" | jq -s 'add')"
          existing_json="$(printf '%s' "$releases_json" | jq -c --arg tag "$RELEASE_TAG" '[.[] | select(.tag_name == $tag)]')"
          existing_count="$(printf '%s' "$existing_json" | jq 'length')"
          if [ "$existing_count" -gt 1 ]; then
            printf '%s\n' "error: multiple GitHub Releases use ${RELEASE_TAG}" >&2
            exit 1
          fi
          if [ "$existing_count" -eq 1 ]; then
            existing_release="$(printf '%s' "$existing_json" | jq -c '.[0]')"
            existing_id="$(printf '%s' "$existing_release" | jq -r '.id')"
            existing_draft="$(printf '%s' "$existing_release" | jq -r '.draft')"
            existing_complete="$(printf '%s' "$existing_release" | jq --argjson expected "$expected_assets_json" '
              .draft == false and
              .prerelease == false and
              ([.assets[].name] | sort) == $expected and
              all(.assets[]; .state == "uploaded") and
              all(.assets[]; ((.digest // "") | test("^sha256:[0-9a-f]{64}$")))')"
            if [ "$existing_complete" = true ]; then
              if [ "$tag_exists" != true ]; then
                printf '%s\n' "error: complete release ${RELEASE_TAG} is missing its tag" >&2
                exit 1
              fi
              printf '%s\n' "release ${RELEASE_TAG} is already complete"
              exit 0
            fi
            if [ "$existing_draft" != true ]; then
              printf '%s\n' "error: refusing to replace incomplete published release ${RELEASE_TAG}" >&2
              exit 1
            fi
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${existing_id}"
          fi

          release_json="$(jq -nc \
            --arg tag "$RELEASE_TAG" \
            --arg sha "$GITHUB_SHA" \
            --arg name "$CODE_VERSION" \
            '{tag_name: $tag, target_commitish: $sha, name: $name, draft: true, prerelease: false, generate_release_notes: true}' \
            | gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" --input -)"
          release_id="$(printf '%s' "$release_json" | jq -r '.id')"
          if ! printf '%s' "$release_id" | grep -Eq '^[0-9]+$'; then
            printf '%s\n' "error: GitHub returned an invalid release ID for ${RELEASE_TAG}" >&2
            exit 1
          fi

          files=(
            "$release_dir/lanspeedd-${CODE_VERSION}.apk"
            "$release_dir/lanspeedd-bpf-${CODE_VERSION}.apk"
            "$release_dir/luci-app-lanspeed-${CODE_VERSION}.apk"
            "$release_dir/lanspeedd-${CODE_VERSION}-aarch64.apk"
            "$release_dir/lanspeedd-bpf-${CODE_VERSION}-aarch64.apk"
            "$release_dir/luci-app-lanspeed-${CODE_VERSION}-aarch64.apk"
          )
          gh release upload "$RELEASE_TAG" "${files[@]}"

          assets_complete=false
          for attempt in $(seq 1 12); do
            release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}")"
            assets_complete="$(printf '%s' "$release_json" | jq --argjson expected "$expected_assets_json" '
              .draft == true and
              .prerelease == false and
              ([.assets[].name] | sort) == $expected and
              all(.assets[]; .state == "uploaded") and
              all(.assets[]; ((.digest // "") | test("^sha256:[0-9a-f]{64}$")))')"
            [ "$assets_complete" = true ] && break
            sleep 5
          done
          if [ "$assets_complete" != true ]; then
            printf '%s\n' "error: draft release ${RELEASE_TAG} assets did not become complete" >&2
            exit 1
          fi

          jq -nc '{draft: false}' \
            | gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" --input - >/dev/null

          published_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}")"
          published_complete="$(printf '%s' "$published_json" | jq --argjson expected "$expected_assets_json" '
            .draft == false and
            .prerelease == false and
            ([.assets[].name] | sort) == $expected and
            all(.assets[]; .state == "uploaded") and
            all(.assets[]; ((.digest // "") | test("^sha256:[0-9a-f]{64}$")))')"
          if [ "$published_complete" != true ]; then
            printf '%s\n' "error: published release ${RELEASE_TAG} failed final validation" >&2
            exit 1
          fi

          final_tag_refs="$(git ls-remote --exit-code --tags origin \
            "refs/tags/${RELEASE_TAG}" "refs/tags/${RELEASE_TAG}^{}")"
          final_tag_target="$(printf '%s\n' "$final_tag_refs" | awk -v peeled="refs/tags/${RELEASE_TAG}^{}" \
            '$2 == peeled { print $1; found=1 } END { if (!found) exit 1 }' 2>/dev/null || true)"
          if [ -z "$final_tag_target" ]; then
            final_tag_target="$(printf '%s\n' "$final_tag_refs" | awk -v direct="refs/tags/${RELEASE_TAG}" \
              '$2 == direct { print $1; exit }')"
          fi
          if [ "$final_tag_target" != "$GITHUB_SHA" ]; then
            printf '%s\n' "error: published tag ${RELEASE_TAG} points to ${final_tag_target:-none}, expected ${GITHUB_SHA}" >&2
            exit 1
          fi
